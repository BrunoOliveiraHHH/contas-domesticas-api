spring:
  # Conexao local PostgreSQL (uso proprio — credenciais hardcoded).
  datasource:
    url: jdbc:postgresql://localhost:5432/contasdomesticas
    username: contasdomesticas
    password: contasapi
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: contasdomesticas-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  devtools:
    restart:
      enabled: true

logging:
  level:
    br.com.contasdomesticas: DEBUG
