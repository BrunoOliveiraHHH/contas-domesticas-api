spring:
  # Banco H2 em memoria — testes isolados, sem depender de PostgreSQL.
  datasource:
    url: jdbc:h2:mem:contasdomesticas;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    # Roda o data.sql (seed de teste) apos o Hibernate criar o schema.
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway desabilitado nos testes (schema gerado pelo Hibernate).
  flyway:
    enabled: false

  sql:
    init:
      mode: always
