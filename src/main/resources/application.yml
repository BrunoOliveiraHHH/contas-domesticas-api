spring:
  application:
    name: contas-domesticas-api

  profiles:
    active: dev

  # Encerramento gracioso: aguarda requisicoes em andamento antes de desligar.
  lifecycle:
    timeout-per-shutdown-phase: 20s

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Respostas de erro no padrao RFC 7807 (ProblemDetail).
  mvc:
    problemdetails:
      enabled: true

  jackson:
    time-zone: America/Sao_Paulo
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain,text/css,text/html
    min-response-size: 1024
  error:
    include-stacktrace: never
    include-message: always

# Configuracao da aplicacao (chaves consumidas pelo codigo nas proximas sprints).
app:
  security:
    jwt:
      # Segredo HS256 (uso proprio) — prefixo + 256 bits aleatorios (32 bytes hex).
      secret: "contas-domesticas-api-669e51a7ead5e2e64d532aeac2ebdfa94f6c56fca27303f7dfb5d30196371c82"
      access-expiration: 15m
      refresh-expiration: 7d

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    git:
      enabled: true
      mode: simple
    build:
      enabled: true
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
